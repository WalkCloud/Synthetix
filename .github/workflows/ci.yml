name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load runtime versions
        shell: bash
        run: |
          echo "NODE_VERSION=$(jq -r .node config/runtime-versions.json)" >> "$GITHUB_ENV"
          echo "PNPM_VERSION=$(jq -r .pnpm config/runtime-versions.json)" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Generate app metadata
        # Bake package.json version into src/generated/app-version.ts so typecheck,
        # build and tests all see the same version. Without this, a version bump
        # in package.json silently ships a build whose About dialog still shows
        # the old version (the v1.0.2 / v1.0.3 regression).
        run: pnpm run generate:meta

      - name: Compile Electron
        run: pnpm run electron:compile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Verify version consistency
        # Asserts package.json == src/generated/app-version.ts (and app.asar
        # when an Electron build is present). Fails the build on version drift.
        run: pnpm run verify:versions

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:run

      - name: Build
        run: pnpm run build
